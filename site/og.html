<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;
    background:
      radial-gradient(70% 90% at 78% 30%, rgba(255,92,87,0.22), transparent 60%),
      linear-gradient(160deg, #1b1d24 0%, #111218 60%, #0d0e12 100%);
    color:#F2F4F0;display:flex;align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  .pad{padding:0 84px;display:flex;align-items:center;gap:56px;width:100%}
  .copy{flex:1}
  .icon{width:208px;height:208px;border-radius:46px;box-shadow:0 30px 70px rgba(0,0,0,0.55)}
  h1{font-size:62px;line-height:1.05;letter-spacing:-0.03em;font-weight:600}
  h1 .accent{color:#FF5C57}
  p{margin-top:22px;font-size:27px;color:#aeb3bd;max-width:18ch;line-height:1.3}
  .foot{margin-top:34px;display:flex;align-items:center;gap:14px;font-size:19px;color:#7e828c}
  .dot{width:9px;height:9px;border-radius:50%;background:#FF5C57;box-shadow:0 0 0 5px rgba(255,92,87,0.18)}
</style></head>
<body>
  <div class="pad">
    <div class="copy">
      <h1>The master clock<br>for your gear.<br><span class="accent">No DAW required.</span></h1>
      <p>Sync every MIDI device, with Ableton Link, from the menu bar.</p>
      <div class="foot"><span class="dot"></span>Synclock · free &amp; open source · macOS</div>
    </div>
    <img class="icon" src="assets/icon-512.png" alt="Synclock">
  </div>
</body></html>
